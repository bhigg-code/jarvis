<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Jarvis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: #0a0a0f;
    color: #e0e8ff;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    transition: background 0.3s;
  }

  body.theme-dim {
    background: #12151f;
  }

  /* ── Header ──────────────────────────────────────────────────────────────── */
  header {
    width: 100%;
    padding: 14px 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1a2040;
    flex-shrink: 0;
    position: relative;
  }

  .hamburger-btn {
    font-size: 18px;
    width: 40px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid #1e3a5f;
    background: #0d2040;
    color: #4fc3f7;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
    flex-shrink: 0;
    transition: background 0.2s;
    z-index: 1;
  }
  .hamburger-btn:active { background: #1a3060; }

  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #4fc3f7;
    text-shadow: 0 0 20px #4fc3f755;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .status-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #0d2040;
    border: 1px solid #1e3a5f;
    color: #4fc3f7;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: background 0.3s, color 0.3s, border-color 0.3s;
    flex-shrink: 0;
    z-index: 1;
  }

  /* ── Drawer Overlay ───────────────────────────────────────────────────────── */
  #drawerOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #drawerOverlay.open {
    opacity: 1;
    pointer-events: all;
  }

  /* ── Side Drawer ──────────────────────────────────────────────────────────── */
  #drawer {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 280px;
    background: #060d1a;
    border-right: 1px solid #1e3a5f;
    z-index: 101;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #drawer.open {
    transform: translateX(0);
  }

  .drawer-header {
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #1a2a40;
    flex-shrink: 0;
    padding-top: calc(16px + var(--safe-top));
  }
  .drawer-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #4fc3f7;
  }
  .drawer-close {
    font-size: 18px;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid #1e3a5f;
    background: #0d1a2e;
    color: #8ab4d8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .drawer-close:active { background: #1a2a40; }

  .drawer-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .drawer-section-header {
    font-size: 10px;
    letter-spacing: 2px;
    color: #3a5080;
    text-transform: uppercase;
    padding: 12px 16px 6px;
  }

  /* ── Session List ─────────────────────────────────────────────────────────── */
  .new-session-btn {
    display: block;
    margin: 4px 8px 8px;
    padding: 8px 16px;
    background: #0d2040;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    color: #4fc3f7;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    letter-spacing: 1px;
    touch-action: manipulation;
    transition: background 0.2s;
  }
  .new-session-btn:active { background: #1a3060; }

  .session-list {
    list-style: none;
    padding: 0;
  }

  .session-row {
    padding: 10px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 8px;
    margin: 2px 8px;
    transition: background 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }
  .session-row:hover { background: #0a1628; }
  .session-row.active {
    background: #0d2040;
    border: 1px solid #1e3a5f;
  }
  .session-row-left {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .session-name {
    font-size: 13px;
    color: #c5d8ff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-date {
    font-size: 11px;
    color: #3a5080;
  }
  .session-delete-btn {
    font-size: 14px;
    color: #ef5350;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    flex-shrink: 0;
    touch-action: manipulation;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .session-delete-btn:active { opacity: 1; }

  .session-rename-input {
    background: #0d1a2e;
    color: #c5d8ff;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    outline: none;
    width: 100%;
  }

  /* ── Admin Panel ──────────────────────────────────────────────────────────── */
  .admin-row {
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .admin-label {
    font-size: 12px;
    color: #8ab4d8;
    letter-spacing: 1px;
  }
  .admin-select {
    background: #0d1a2e;
    color: #8ab4d8;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    min-height: 34px;
    max-width: 160px;
  }
  .theme-btns {
    display: flex;
    gap: 6px;
  }
  .theme-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #1e3a5f;
    background: #0d1a2e;
    color: #8ab4d8;
    font-size: 12px;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.2s, color 0.2s;
  }
  .theme-btn.active {
    background: #1a3060;
    color: #4fc3f7;
    border-color: #4fc3f755;
  }
  .clear-session-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #5c1a1a;
    background: #2a0d0d;
    color: #ef9a9a;
    font-size: 12px;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.2s;
  }
  .clear-session-btn:active { background: #3a1010; }
  .version-text {
    font-size: 12px;
    color: #3a5080;
    letter-spacing: 1px;
  }
  .drawer-divider {
    height: 1px;
    background: #1a2a40;
    margin: 8px 16px;
  }

  /* ── Chat Area ────────────────────────────────────────────────────────────── */
  .stream-content::after {
    content: '█';
    animation: blink 0.8s step-end infinite;
    color: #00e676;
    font-size: 13px;
    margin-left: 2px;
  }
  .stream-content.done::after { content: ''; animation: none; }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .chat-area {
    flex: 1;
    width: 100%;
    padding: 16px 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overscroll-behavior: contain;
  }

  .message {
    max-width: 92%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.55;
    animation: fadeIn 0.3s ease;
    word-break: break-word;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .message.user {
    align-self: flex-end;
    background: #1a3060;
    border-bottom-right-radius: 4px;
    color: #c5d8ff;
  }
  .message.jarvis {
    align-self: flex-start;
    background: #0d1a2e;
    border: 1px solid #1e3a5f;
    border-bottom-left-radius: 4px;
  }
  .message.jarvis .speaker {
    font-size: 11px;
    color: #4fc3f7;
    letter-spacing: 2px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .message.error {
    align-self: flex-start;
    background: #2a0d0d;
    border: 1px solid #5c1a1a;
    color: #ef9a9a;
    font-size: 13px;
  }

  .thinking {
    align-self: flex-start;
    color: #4fc3f7;
    font-size: 13px;
    opacity: 0.7;
    padding: 8px 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot-flashing { display: flex; gap: 4px; }
  .dot-flashing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4fc3f7;
    animation: dotBlink 1.2s infinite;
  }
  .dot-flashing span:nth-child(2) { animation-delay: 0.2s; }
  .dot-flashing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBlink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* ── Controls ─────────────────────────────────────────────────────────────── */
  .controls {
    width: 100%;
    padding: 12px 14px;
    padding-bottom: calc(12px + var(--safe-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border-top: 1px solid #1a2040;
    background: #080810;
    flex-shrink: 0;
  }

  .mic-ring {
    position: relative;
    width: 90px; height: 90px;
  }
  .mic-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid #4fc3f733;
    transition: all 0.3s;
    pointer-events: none;
  }
  .mic-ring.recording::before {
    border-color: #ef5350;
    box-shadow: 0 0 20px #ef535055;
    animation: ringPulse 1s infinite;
  }
  @keyframes ringPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  #micBtn {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #1a3a6e, #0d2040);
    color: #4fc3f7;
    font-size: 32px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px #00000088, inset 0 1px 0 #ffffff11;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
  }
  #micBtn:active { transform: scale(0.93); }
  #micBtn.recording { background: linear-gradient(135deg, #5c1a1a, #3a0d0d); color: #ef5350; }
  #micBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint {
    font-size: 12px;
    color: #3a5080;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }

  .text-input-row {
    width: 100%;
    display: flex;
    gap: 8px;
  }
  #textInput {
    flex: 1;
    background: #0d1a2e;
    color: #c5d8ff;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
    min-height: 44px;
  }
  #textInput::placeholder { color: #2a4060; }
  #sendBtn {
    background: #1a3060;
    color: #4fc3f7;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 20px;
    cursor: pointer;
    touch-action: manipulation;
    min-height: 44px;
    min-width: 44px;
  }
  .voice-note {
    font-size: 11px;
    color: #2a4060;
    text-align: center;
  }

  /* ── Splash Screen ────────────────────────────────────────────────────────── */
  #splash {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 9999;
    cursor: pointer;
    transition: opacity 0.4s ease;
  }
  #splash.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .splash-logo {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #4fc3f7;
    text-shadow: 0 0 40px #4fc3f777;
  }
  .splash-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 2px solid #1e3a5f;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: splashPulse 2s infinite;
    background: radial-gradient(ellipse at 35% 35%, #1a4a7a, #0a1628, #020810);
    box-shadow: 0 0 60px #4fc3f733, inset 0 0 40px #0a2040;
    position: relative;
    overflow: hidden;
  }
  .splash-ring svg {
    width: 120px; height: 120px;
    filter: drop-shadow(0 0 12px #4fc3f7aa);
  }
  .splash-ring::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 60%, #4fc3f711 70%, transparent 80%);
    animation: rotate 4s linear infinite;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }
  @keyframes splashPulse {
    0%,100% { box-shadow: 0 0 30px #4fc3f722, inset 0 0 40px #0a2040; border-color: #1e3a5f; }
    50% { box-shadow: 0 0 70px #4fc3f755, inset 0 0 40px #0a2040; border-color: #4fc3f7; }
  }
  .splash-hint {
    font-size: 13px;
    color: #3a5080;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- Splash screen — tap to activate audio then dismiss -->
<div id="splash">
  <div class="splash-logo">J.A.R.V.I.S</div>
  <div class="splash-ring">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Globe base -->
      <circle cx="50" cy="50" r="45" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.6"/>
      <circle cx="50" cy="50" r="45" fill="url(#globeGrad)" opacity="0.3"/>
      <!-- Latitude lines -->
      <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
      <ellipse cx="50" cy="50" rx="45" ry="30" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
      <line x1="5" y1="50" x2="95" y2="50" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
      <!-- Longitude lines -->
      <ellipse cx="50" cy="50" rx="15" ry="45" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
      <ellipse cx="50" cy="50" rx="30" ry="45" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.4"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
      <!-- Glow dots -->
      <circle cx="50" cy="50" r="3" fill="#4fc3f7" opacity="0.9"/>
      <circle cx="72" cy="35" r="2" fill="#7dd3fc" opacity="0.8"/>
      <circle cx="28" cy="62" r="1.5" fill="#7dd3fc" opacity="0.7"/>
      <circle cx="65" cy="68" r="1.5" fill="#93c5fd" opacity="0.6"/>
      <!-- Orbit ring -->
      <ellipse cx="50" cy="50" rx="45" ry="12" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.3" transform="rotate(-30 50 50)"/>
      <defs>
        <radialGradient id="globeGrad" cx="35%" cy="35%">
          <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
        </radialGradient>
      </defs>
    </svg>
  </div>
  <div class="splash-hint" id="splashHint">Loading voice...</div>
</div>

<!-- Drawer Overlay -->
<div id="drawerOverlay"></div>

<!-- Side Drawer -->
<div id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">J.A.R.V.I.S</div>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody">

    <!-- SESSIONS section -->
    <div class="drawer-section-header">SESSIONS</div>
    <button class="new-session-btn" id="newSessionBtn">＋ New Session</button>
    <ul class="session-list" id="sessionList"></ul>

    <div class="drawer-divider"></div>

    <!-- ADMIN section -->
    <div class="drawer-section-header">ADMIN</div>

    <!-- Voice -->
    <div class="admin-row">
      <span class="admin-label">VOICE</span>
      <select class="admin-select" id="voiceSelect">
        <option value="wDsJlOXPqcvIUKdLXjDs">Jarvis</option>
        <option value="NYC9WEgkq1u4jiqBseQ9" selected>Russell (default)</option>
        <option value="bfGb7JTLUnZebZRiFYyq">Voice 2</option>
      </select>
    </div>

    <!-- Theme -->
    <div class="admin-row">
      <span class="admin-label">THEME</span>
      <div class="theme-btns">
        <button class="theme-btn active" id="themeDarkBtn">Dark</button>
        <button class="theme-btn" id="themeDimBtn">Dim</button>
      </div>
    </div>

    <!-- Clear Session -->
    <div class="admin-row">
      <span class="admin-label">CLEAR SESSION</span>
      <button class="clear-session-btn" id="clearSessionBtn">Clear</button>
    </div>

    <!-- Version -->
    <div class="admin-row">
      <span class="admin-label">VERSION</span>
      <span class="version-text">v1.1.0</span>
    </div>

  </div>
</div>

<!-- Main layout -->
<header>
  <button class="hamburger-btn" id="hamburgerBtn">☰</button>
  <div class="logo">J.A.R.V.I.S</div>
  <div class="status-pill" id="statusPill">READY</div>
</header>

<div class="chat-area" id="chatArea">
  <div class="message jarvis">
    <div class="speaker">JARVIS</div>
    Online and ready. Tap the microphone or type below.
  </div>
</div>

<div class="controls">
  <div style="display:flex;gap:16px;align-items:center;justify-content:center">
    <button id="stopBtn" title="Stop" style="width:48px;height:48px;border-radius:50%;border:none;background:#1a0d0d;color:#ef5350;font-size:22px;cursor:pointer;opacity:0.3;transition:all 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation" disabled>⏹</button>
    <div class="mic-ring" id="micRing">
      <button id="micBtn" title="Tap to speak">🎤</button>
    </div>
  </div>
  <div class="hint" id="hintText">tap to speak</div>

  <div class="text-input-row">
    <input type="text" id="textInput" placeholder="Or type here…" autocomplete="off" autocorrect="off">
    <button id="sendBtn">➤</button>
  </div>
  <div class="voice-note" id="voiceNote"></div>
</div>

<script>
// ── DOM refs ──────────────────────────────────────────────────────────────────
const chatArea    = document.getElementById('chatArea');
const micBtn      = document.getElementById('micBtn');
const micRing     = document.getElementById('micRing');
const hintText    = document.getElementById('hintText');
const textInput   = document.getElementById('textInput');
const sendBtn     = document.getElementById('sendBtn');
const statusPill  = document.getElementById('statusPill');
const voiceNote   = document.getElementById('voiceNote');
const voiceSelect = document.getElementById('voiceSelect');
const stopBtn     = document.getElementById('stopBtn');

// Drawer refs
const hamburgerBtn  = document.getElementById('hamburgerBtn');
const drawer        = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawerOverlay');
const drawerClose   = document.getElementById('drawerClose');
const newSessionBtn = document.getElementById('newSessionBtn');
const sessionList   = document.getElementById('sessionList');
const clearSessionBtn = document.getElementById('clearSessionBtn');
const themeDarkBtn  = document.getElementById('themeDarkBtn');
const themeDimBtn   = document.getElementById('themeDimBtn');

let abortController = null;

// ── Stop button ───────────────────────────────────────────────────────────────
function enableStop() {
  stopBtn.disabled = false;
  stopBtn.style.opacity = '1';
}
function disableStop() {
  stopBtn.disabled = true;
  stopBtn.style.opacity = '0.3';
}

stopBtn.addEventListener('click', () => {
  if (!_audioEl.paused) { _audioEl.pause(); _audioEl.src = ''; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  if (abortController) { abortController.abort(); abortController = null; }
  if (isRecording) {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    stopRecording();
  }
  setStatus('READY');
  hintText.textContent = 'tap to speak';
  disableStop();
  addMessage('error', 'Stopped.');
});

// ── Recording state ───────────────────────────────────────────────────────────
let isRecording   = false;
let mediaRecorder = null;
let audioChunks   = [];
let audioUnlocked = false;
let audioQueue    = [];

// ── Single persistent <audio> element ────────────────────────────────────────
const _audioEl = document.createElement('audio');
_audioEl.preload = 'auto';
document.body.appendChild(_audioEl);

// ── Audio Unlock ──────────────────────────────────────────────────────────────
function unlockAudio() {
  if (audioUnlocked) return Promise.resolve();
  _audioEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  return _audioEl.play().then(() => {
    audioUnlocked = true;
    _audioEl.pause();
    _audioEl.src = '';
    if (audioQueue.length) {
      const next = audioQueue.shift();
      playBase64Audio(next);
    }
  }).catch(() => {
    audioUnlocked = true;
  });
}
document.addEventListener('touchstart', () => unlockAudio(), { once: true });
document.addEventListener('click',      () => unlockAudio(), { once: true });

// ── Session Storage ───────────────────────────────────────────────────────────
const SESSION_KEY     = 'jarvis_sessions';
const MAX_SESSIONS    = 50;
const MAX_MSG_PER_SES = 200;

let sessions = [];
let currentSessionId = null;
let loadingSession = false; // suppress scroll animation during restore

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function saveSessions() {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(sessions)); } catch(e) {}
}

function loadSessions() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (raw) sessions = JSON.parse(raw);
  } catch(e) { sessions = []; }
  if (!sessions.length) {
    sessions.push(createSessionObj('Session 1'));
    saveSessions();
  }
  currentSessionId = sessions[sessions.length - 1].id;
}

function createSessionObj(name) {
  return { id: genId(), name, createdAt: Date.now(), messages: [] };
}

function currentSession() {
  return sessions.find(s => s.id === currentSessionId) || sessions[0];
}

function addNewSession() {
  const name = 'Session ' + (sessions.length + 1);
  const sess = createSessionObj(name);
  sessions.push(sess);
  // Prune oldest if over limit
  while (sessions.length > MAX_SESSIONS) sessions.shift();
  saveSessions();
  switchSession(sess.id);
  renderSessionList();
}

function switchSession(id) {
  currentSessionId = id;
  renderSessionList();
  repopulateChatFromSession();
}

function deleteSession(id) {
  if (sessions.length <= 1) return;
  const idx = sessions.findIndex(s => s.id === id);
  if (idx === -1) return;
  sessions.splice(idx, 1);
  // If we deleted the current session, switch to last
  if (id === currentSessionId) {
    currentSessionId = sessions[sessions.length - 1].id;
  }
  saveSessions();
  renderSessionList();
  if (id === currentSessionId || sessions.findIndex(s => s.id === currentSessionId) === -1) {
    repopulateChatFromSession();
  }
}

function saveMessageToSession(role, text) {
  const sess = currentSession();
  if (!sess) return;
  sess.messages.push({ role, text, ts: Date.now() });
  // Trim oldest messages if over limit
  while (sess.messages.length > MAX_MSG_PER_SES) sess.messages.shift();
  saveSessions();
}

function formatSessionDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Render Session List ───────────────────────────────────────────────────────
function renderSessionList() {
  sessionList.innerHTML = '';
  // Render newest first
  const ordered = [...sessions].reverse();
  ordered.forEach(sess => {
    const li = document.createElement('li');
    li.className = 'session-row' + (sess.id === currentSessionId ? ' active' : '');
    li.dataset.id = sess.id;

    const left = document.createElement('div');
    left.className = 'session-row-left';

    const nameEl = document.createElement('div');
    nameEl.className = 'session-name';
    nameEl.textContent = sess.name;

    const dateEl = document.createElement('div');
    dateEl.className = 'session-date';
    dateEl.textContent = formatSessionDate(sess.createdAt);

    left.appendChild(nameEl);
    left.appendChild(dateEl);

    const right = document.createElement('div');
    right.style.display = 'flex';
    right.style.alignItems = 'center';
    right.style.gap = '4px';

    if (sessions.length > 1) {
      const delBtn = document.createElement('button');
      delBtn.className = 'session-delete-btn';
      delBtn.textContent = '🗑';
      delBtn.title = 'Delete session';
      delBtn.addEventListener('click', e => {
        e.stopPropagation();
        deleteSession(sess.id);
      });
      right.appendChild(delBtn);
    }

    li.appendChild(left);
    li.appendChild(right);

    // Tap to switch
    li.addEventListener('click', () => {
      if (sess.id !== currentSessionId) {
        switchSession(sess.id);
        closeDrawer();
      }
    });

    // Long-press to rename (500ms)
    let pressTimer = null;
    const startPress = () => {
      pressTimer = setTimeout(() => {
        showRenameInput(li, nameEl, sess);
      }, 500);
    };
    const cancelPress = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
    li.addEventListener('touchstart', startPress, { passive: true });
    li.addEventListener('touchend',   cancelPress);
    li.addEventListener('touchmove',  cancelPress, { passive: true });
    li.addEventListener('mousedown',  startPress);
    li.addEventListener('mouseup',    cancelPress);
    li.addEventListener('mouseleave', cancelPress);

    sessionList.appendChild(li);
  });
}

function showRenameInput(li, nameEl, sess) {
  const input = document.createElement('input');
  input.className = 'session-rename-input';
  input.value = sess.name;
  input.maxLength = 40;

  const left = li.querySelector('.session-row-left');
  left.replaceChild(input, nameEl);
  input.focus();
  input.select();

  const finish = () => {
    const val = input.value.trim();
    if (val) sess.name = val;
    saveSessions();
    renderSessionList();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = sess.name; input.blur(); }
  });
}

// ── Repopulate chat from session ──────────────────────────────────────────────
function repopulateChatFromSession() {
  chatArea.innerHTML = '';
  const sess = currentSession();
  if (!sess || !sess.messages.length) {
    // Default welcome
    const div = document.createElement('div');
    div.className = 'message jarvis';
    div.innerHTML = '<div class="speaker">JARVIS</div>Online and ready. Tap the microphone or type below.';
    chatArea.appendChild(div);
    return;
  }
  loadingSession = true;
  sess.messages.forEach(msg => {
    addMessage(msg.role, msg.text, null, true);
  });
  loadingSession = false;
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── Drawer open/close ─────────────────────────────────────────────────────────
function openDrawer() {
  renderSessionList();
  drawer.classList.add('open');
  drawerOverlay.classList.add('open');
}
function closeDrawer() {
  drawer.classList.remove('open');
  drawerOverlay.classList.remove('open');
}

hamburgerBtn.addEventListener('click', openDrawer);
drawerClose.addEventListener('click', closeDrawer);
drawerOverlay.addEventListener('click', closeDrawer);
newSessionBtn.addEventListener('click', () => { addNewSession(); closeDrawer(); });

// ── Clear current session ─────────────────────────────────────────────────────
clearSessionBtn.addEventListener('click', () => {
  const sess = currentSession();
  if (!sess) return;
  sess.messages = [];
  saveSessions();
  repopulateChatFromSession();
  closeDrawer();
});

// ── Load ElevenLabs voices ────────────────────────────────────────────────────
async function loadVoices() {
  try {
    const resp = await fetch('/voices');
    const voices = await resp.json();
    if (!voices.length) return;
    voiceSelect.innerHTML = '';
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = v.name;
      if (v.id === 'NYC9WEgkq1u4jiqBseQ9') opt.selected = true;
      voiceSelect.appendChild(opt);
    });
  } catch(e) { /* keep default */ }
}

// ── Splash + Greeting ─────────────────────────────────────────────────────────
const splash = document.getElementById('splash');
let greetingAudioB64 = null;
let greetingPlayed   = false;

async function prefetchGreeting() {
  const hint = document.getElementById('splashHint');
  try {
    const vid = voiceSelect.value || 'NYC9WEgkq1u4jiqBseQ9';
    const r = await fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: 'Online and ready, sir. Tap the microphone or type below.',
        voice_id: vid
      })
    });
    const d = await r.json();
    if (d.audio) {
      greetingAudioB64 = d.audio;
      if (hint && !greetingPlayed) hint.textContent = 'Tap to activate';
    }
  } catch(e) {
    if (hint) hint.textContent = 'Tap to activate';
  }
}

function playGreetingOnce() {
  if (greetingPlayed) return;
  greetingPlayed = true;
  if (greetingAudioB64) {
    playBase64Audio(greetingAudioB64);
  } else {
    const vid = voiceSelect.value || 'NYC9WEgkq1u4jiqBseQ9';
    fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: 'Online and ready, sir. Tap the microphone or type below.', voice_id: vid })
    }).then(r => r.json()).then(d => { if (d.audio) playBase64Audio(d.audio); });
  }
}

// Splash tap: unlock audio, play greeting, dismiss
splash.addEventListener('click', async () => {
  await unlockAudio();
  splash.classList.add('hidden');
  setTimeout(() => splash.style.display = 'none', 400);
  greetingPlayed = true;
  if (greetingAudioB64) {
    playBase64Audio(greetingAudioB64);
  } else {
    try {
      const vid = voiceSelect.value || 'NYC9WEgkq1u4jiqBseQ9';
      const r = await fetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: 'Online and ready, sir. Tap the microphone or type below.',
          voice_id: vid
        })
      });
      const d = await r.json();
      if (d.audio) playBase64Audio(d.audio);
    } catch(e) {}
  }
});

const hasMediaRecorder = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);

if (hasMediaRecorder) {
  voiceNote.textContent = 'Tap mic → speak → tap again to send';
} else {
  voiceNote.textContent = 'Voice not supported in this browser — use text input below';

document.addEventListener('mousedown',  () => { unlockAudio(); }, { passive: true });

// ── Transcribe and send ───────────────────────────────────────────────────────
async function transcribeAndSend(blob) {
  setStatus('TRANSCRIBING');
  hintText.textContent = 'transcribing…';
  try {
    const formData = new FormData();
    formData.append('audio', blob, 'recording.webm');
    const resp = await fetch('/transcribe', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.text && data.text.trim()) {
      if (!_audioEl.paused) { _audioEl.pause(); _audioEl.src = ''; }
      if (window.speechSynthesis) speechSynthesis.cancel();
      audioUnlocked = true;
      sendMessage(data.text.trim());
    } else {
      addMessage('error', 'Could not understand audio. Please try again.');
      setStatus('READY');
    }
  } catch (e) {
    addMessage('error', `Transcription failed: ${e.message}`);
    setStatus('READY');
  }
  hintText.textContent = 'tap to speak';
}

// ── Stop recording helper ─────────────────────────────────────────────────────
function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording');
  micRing.classList.remove('recording');
  micBtn.textContent = '🎤';
  hintText.textContent = 'tap to speak';
}

// ── Mic button ────────────────────────────────────────────────────────────────
micBtn.addEventListener('click', () => {
  unlockAudio();
  audioUnlocked = true;
  playGreetingOnce();
  if (isRecording) {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    stopRecording();
    return;
  }

  if (!_audioEl.paused) { _audioEl.pause(); _audioEl.src = ''; }
  setStatus('REQUESTING MIC...');
  hintText.textContent = 'requesting mic...';

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      audioChunks = [];
      let mimeType = 'audio/webm';
      if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
      else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: mimeType });
        if (blob.size < 500) {
          addMessage('error', 'Recording too short — try again and speak clearly.');
          setStatus('READY'); hintText.textContent = 'tap to speak';
          return;
        }
        transcribeAndSend(blob);
      };
      mediaRecorder.onerror = e => { addMessage('error', `Recording error: ${e.error}`); stopRecording(); };
      mediaRecorder.start(100);
      isRecording = true;
      micBtn.classList.add('recording');
      micRing.classList.add('recording');
      micBtn.textContent = '🔴';
      hintText.textContent = 'recording… tap to stop';
      setStatus('RECORDING');
    })
    .catch(err => {
      addMessage('error', `🎤 Mic error: ${err.name} — ${err.message}`);
      stopRecording();
      setStatus('READY'); hintText.textContent = 'tap to speak';
    });
});

// ── Streaming send ────────────────────────────────────────────────────────────
const THOUGHTS = [
  'Get a cup of tea.',
  'Stretch your legs for a moment.',
  'Take a deep breath.',
  'Check your posture.',
  'Have a glass of water.',
  'Look away from the screen for a second.',
  'Crack your knuckles if you must.',
  'The weather outside might be worth a glance.',
  'A brief moment of zen never hurt anyone.',
  'Consider blinking. Humans forget sometimes.',
];

// ── Secrets / credential guard (client-side) ────────────────────────────────
// Patterns that look like secrets, API keys, passwords, tokens, etc.
// If a match is found the message is blocked before it ever leaves the browser.
// Each entry: [regex, description]
// Patterns are precise — anchored to known prefixes to avoid false positives on normal speech.
const SECRET_PATTERNS = [
  [/\bsk-[A-Za-z0-9_\-]{20,}\b/,              'OpenAI key'],
  [/\bsk_[A-Za-z0-9_\-]{20,}\b/,              'ElevenLabs key'],
  [/\bghp_[A-Za-z0-9_]{36,}\b/,               'GitHub PAT'],
  [/\bgho_[A-Za-z0-9_]{36,}\b/,               'GitHub OAuth token'],
  [/\bghx_[A-Za-z0-9_]{36,}\b/,               'GitHub token'],
  [/\bghs_[A-Za-z0-9_]{36,}\b/,               'GitHub server token'],
  [/\bglpat-[A-Za-z0-9_\-]{20,}\b/,           'GitLab PAT'],
  [/\bxox[baprs]-[0-9A-Za-z\-]{10,}\b/,       'Slack token'],
  [/\bAIza[0-9A-Za-z\-_]{35}\b/,              'Google API key'],
  [/\bhvs\.[A-Za-z0-9]{24,}\b/,               'Vault token'],
  [/\bAKIA[0-9A-Z]{16}\b/,                    'AWS key ID'],
  [/\b(MHT|NTM|ODM)[A-Za-z0-9+/]{40,}={0,2}\b/, 'Possible bot token'],
  [/-----BEGIN (RSA |EC |OPENSSH |PGP )?PRIVATE KEY-----/, 'Private key'],
  // Generic: only fires when an explicit assignment keyword is present (safe for speech)
  [/(?:password|passwd|api[_\s-]?key|secret[_\s-]?key)\s*[:=]\s*\S{8,}/i, 'Credential assignment'],
];

// Returns description of detected secret, or null if clean.
function detectSecret(text) {
  for (const [pat, label] of SECRET_PATTERNS) {
    if (pat.test(text)) return label;
  }
  return null;
}

async function sendMessage(text) {
  if (!text.trim()) return;

  // ── Block if message looks like it contains a secret ──
  if (detectSecret(text)) {
    addMessage('error',
      '⚠️ Message blocked — it appears to contain a secret, API key, or password. ' +
      'Sensitive credentials should never be shared in chat. ' +
      'Please use Vault or environment variables to store secrets.');
    return;
  }
  addMessage('user', text);
  saveMessageToSession('user', text);
  const thinking = addThinking();
  setStatus('THINKING');
  enableStop();

  const thought = THOUGHTS[Math.floor(Math.random() * THOUGHTS.length)];
  const processingText = `Processing your request, sir. This may take a few moments. ${thought}`;
  let processingAudioPlayed = false;
  const processingTTSTimer = setTimeout(() => {
    fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: processingText, voice_id: voiceSelect.value || 'NYC9WEgkq1u4jiqBseQ9' })
    }).then(r => r.json()).then(d => {
      if (d.audio && !streamingStarted) { processingAudioPlayed = true; playBase64Audio(d.audio); }
    }).catch(() => {});
  }, 2000);

  abortController = new AbortController();
  const startTime = Date.now();
  let streamingStarted = false;
  let streamDiv = null;
  let rawAccum  = '';
  let fullReply = '';

  try {
    const resp = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, voice_id: voiceSelect.value || null }),
      signal: abortController.signal
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: `HTTP ${resp.status}` }));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const parts = buf.split('\n\n');
      buf = parts.pop();

      for (const part of parts) {
        const lines = part.split('\n');
        let evtType = 'message', evtData = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) evtType = line.slice(7).trim();
          else if (line.startsWith('data: ')) evtData = line.slice(6).trim();
        }
        if (!evtData) continue;

        let parsed;
        try { parsed = JSON.parse(evtData); } catch { continue; }

        if (evtType === 'progress') {
          if (!streamingStarted && thinking) {
            const dot = thinking.querySelector('.dot-flashing');
            if (dot) {
              const ptext = thinking.querySelector('.progress-text') ||
                (() => {
                  const s = document.createElement('span');
                  s.className = 'progress-text';
                  s.style.cssText = 'font-size:11px;color:#4fc3f7;margin-right:6px';
                  dot.parentNode.insertBefore(s, dot);
                  return s;
                })();
              ptext.textContent = parsed.text || '';
            }
          }
        } else if (evtType === 'token') {
          clearTimeout(processingTTSTimer);
          if (!streamingStarted) {
            streamingStarted = true;
            thinking.remove();
            if (processingAudioPlayed && !_audioEl.paused) { _audioEl.pause(); _audioEl.src = ''; }
            streamDiv = document.createElement('div');
            streamDiv.className = 'message jarvis';
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
            streamDiv.innerHTML = `<div class="speaker">JARVIS <span style="font-size:10px;opacity:0.5">${elapsed} ● streaming</span></div><div class="stream-content"></div>`;
            chatArea.appendChild(streamDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            setStatus('STREAMING');
          }
          rawAccum  += parsed.token;
          fullReply += parsed.token;
          const contentEl = streamDiv.querySelector('.stream-content');
          if (contentEl) {
            contentEl.innerHTML = formatMarkdown(rawAccum);
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } else if (evtType === 'done') {
          fullReply = parsed.reply || fullReply;
          if (streamDiv) {
            const contentEl = streamDiv.querySelector('.stream-content');
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
            streamDiv.querySelector('.speaker').innerHTML =
              `JARVIS <span style="font-size:10px;opacity:0.5">${elapsed}</span>`;
            if (contentEl) {
              contentEl.innerHTML = formatMarkdown(fullReply);
              contentEl.classList.add('done');
            }
          }
          // Save Jarvis reply to session
          saveMessageToSession('jarvis', fullReply);
          setStatus('THINKING');
        } else if (evtType === 'audio') {
          if (parsed.audio) {
            if (processingAudioPlayed && !_audioEl.paused) { _audioEl.pause(); _audioEl.src = ''; }
            playBase64Audio(parsed.audio);
            setStatus('SPEAKING');
          } else {
            setStatus('READY');
            disableStop();
          }
        } else if (evtType === 'error') {
          if (!streamingStarted) thinking.remove();
          addMessage('error', parsed.detail || 'Stream error');
          setStatus('READY');
          disableStop();
        }
      }
    }

    if (!streamingStarted) {
      thinking.remove();
      addMessage('error', 'No response received.');
    }
    clearTimeout(processingTTSTimer);

  } catch (e) {
    clearTimeout(processingTTSTimer);
    if (!streamingStarted) thinking.remove();
    if (e.name !== 'AbortError') {
      addMessage('error', `Connection error: ${e.message}`);
    }
    setStatus('READY');
    disableStop();
  } finally {
    abortController = null;
  }
}

// ── Audio playback ────────────────────────────────────────────────────────────
function playBase64Audio(b64) {
  if (!audioUnlocked) {
    audioQueue = [b64];
    return;
  }
  if (!_audioEl.paused) { _audioEl.pause(); }
  _audioEl.onended = null;
  _audioEl.onerror = null;

  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const blob  = new Blob([bytes], { type: 'audio/mpeg' });
  const url   = URL.createObjectURL(blob);
  _audioEl.src = url;
  _audioEl.onended = () => { setStatus('READY'); disableStop(); URL.revokeObjectURL(url); };
  _audioEl.onerror = () => { setStatus('READY'); disableStop(); URL.revokeObjectURL(url); };
  _audioEl.play().catch(e => {
    console.warn('Audio play failed:', e);
    setStatus('READY'); disableStop();
  });
}

function browserTTS(text) {
  if (!text || !window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92; utt.pitch = 0.85;
  const voices = speechSynthesis.getVoices();
  const deep = voices.find(v => /daniel|oliver|male|en-gb/i.test(v.name + v.lang));
  if (deep) utt.voice = deep;
  speechSynthesis.speak(utt);
  utt.onend = () => setStatus('READY');
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(s) {
  statusPill.textContent = s;
  const colours = {
    'READY':        { bg: '#0d2040', border: '#1e3a5f', color: '#4fc3f7' },
    'THINKING':     { bg: '#1a1a00', border: '#3a3a00', color: '#ffd700' },
    'STREAMING':    { bg: '#001a10', border: '#003a20', color: '#00e676' },
    'SPEAKING':     { bg: '#1a0030', border: '#3a0060', color: '#ce93d8' },
    'TRANSCRIBING': { bg: '#1a0010', border: '#3a0030', color: '#f48fb1' },
    'RECORDING':    { bg: '#1a0000', border: '#3a0000', color: '#ef5350' },
  };
  const c = colours[s] || colours['READY'];
  statusPill.style.background  = c.bg;
  statusPill.style.borderColor = c.border;
  statusPill.style.color       = c.color;
}

function addMessage(role, text, elapsed, suppressScroll) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (role === 'jarvis') {
    const timerHtml = elapsed ? ` <span style="font-size:10px;color:#2a4060;float:right;margin-top:2px">${elapsed}</span>` : '';
    div.innerHTML = `<div class="speaker">JARVIS${timerHtml}</div>${formatMarkdown(text)}`;
  } else if (role === 'user') {
    div.textContent = text;
  } else {
    div.textContent = text;
  }
  // When loading a session, suppress the fadeIn animation
  if (suppressScroll || loadingSession) {
    div.style.animation = 'none';
  }
  chatArea.appendChild(div);
  if (!suppressScroll && !loadingSession) {
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  return div;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  let secs = 0;
  div.innerHTML = `Processing <span id="thinkTimer">0s</span> <div class="dot-flashing"><span></span><span></span><span></span></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  div._timerInterval = setInterval(() => {
    secs++;
    const el = div.querySelector('#thinkTimer');
    if (el) el.textContent = secs + 's';
  }, 1000);
  const origRemove = div.remove.bind(div);
  div.remove = () => { clearInterval(div._timerInterval); origRemove(); };
  return div;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function clean_for_speech(text) {
  return text
    .replace(/```[\s\S]*?```/g, ' code block ')
    .replace(/`[^`]+`/g, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/#+\s/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/[\-\*•]\s/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function formatMarkdown(text) {
  // Unescape literal \n and \t
  text = text.replace(/\\n/g, '\n').replace(/\\t/g, '\t');

  // Tables
  function renderTables(raw) {
    const lines = raw.split('\n');
    let out = [];
    let i = 0;
    while (i < lines.length) {
      if (
        i + 1 < lines.length &&
        /^\|.+\|/.test(lines[i]) &&
        /^\|[\s:\-|]+\|/.test(lines[i + 1])
      ) {
        const headers = lines[i].split('|').map(h => h.trim()).filter(Boolean);
        i += 2;
        let rows = [];
        while (i < lines.length && /^\|.+\|/.test(lines[i])) {
          rows.push(lines[i].split('|').map(c => c.trim()).filter(Boolean));
          i++;
        }
        let tbl = '<div style="overflow-x:auto;margin:8px 0">';
        tbl += '<table style="border-collapse:collapse;width:100%;font-size:13px">';
        tbl += '<thead><tr>';
        headers.forEach(h => {
          tbl += `<th style="background:#0a1e35;color:#7dd3fc;padding:5px 10px;border:1px solid #1e3a5f;text-align:left;white-space:nowrap">${escHtml(h)}</th>`;
        });
        tbl += '</tr></thead><tbody>';
        rows.forEach((row, ri) => {
          const bg = ri % 2 === 0 ? '#060f1e' : '#0a1628';
          tbl += `<tr style="background:${bg}">`;
          row.forEach(cell => {
            tbl += `<td style="padding:4px 10px;border:1px solid #1e3a5f;color:#cbd5e1">${escHtml(cell)}</td>`;
          });
          tbl += '</tr>';
        });
        tbl += '</tbody></table></div>';
        out.push(tbl);
      } else {
        out.push(lines[i]);
        i++;
      }
    }
    return out.join('\n');
  }

  // Code blocks — preserve before escaping
  const codeBlocks = [];
  text = text.replace(/```([\s\S]*?)```/g, (_, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(code.trim());
    return `%%CODE_BLOCK_${idx}%%`;
  });

  text = renderTables(text);

  const parts = text.split(/(%%CODE_BLOCK_\d+%%|<div style="overflow-x[\s\S]*?<\/div>)/);
  text = parts.map(p => {
    if (p.startsWith('%%CODE_BLOCK_')) {
      const idx = parseInt(p.match(/\d+/)[0]);
      return `<pre style="background:#0a1628;padding:8px 12px;border-radius:6px;overflow-x:auto;margin:6px 0;font-size:12px;color:#7dd3fc;border-left:3px solid #1e3a5f"><code>${escHtml(codeBlocks[idx])}</code></pre>`;
    }
    if (p.startsWith('<div style="overflow-x')) return p;
    let s = escHtml(p);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|\s)\*([^*\n]+?)\*($|\s)/g, '$1<em>$2</em>$3');
    s = s.replace(/^### (.+)$/gm, '<div style="font-size:13px;color:#4fc3f7;letter-spacing:1px;text-transform:uppercase;margin:10px 0 4px">$1</div>');
    s = s.replace(/^## (.+)$/gm,  '<div style="font-size:15px;font-weight:700;color:#7dd3fc;margin:12px 0 4px">$1</div>');
    s = s.replace(/^# (.+)$/gm,   '<div style="font-size:17px;font-weight:700;color:#93c5fd;margin:14px 0 6px">$1</div>');
    s = s.replace(/^([ \t]+)[\-\*•] (.+)$/gm, '<div style="padding:2px 0 2px 24px;border-left:2px solid #0f2a45;color:#94a3b8">$2</div>');
    s = s.replace(/^[\-\*•] (.+)$/gm, '<div style="padding:2px 0 2px 12px;border-left:2px solid #1e3a5f">$1</div>');
    s = s.replace(/^(\d+)\. (.+)$/gm, '<div style="padding:2px 0"><span style="color:#4fc3f7;font-weight:600">$1.</span> $2</div>');
    s = s.replace(/`([^`]+)`/g, '<code style="background:#0a1628;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px;color:#7dd3fc">$1</code>');
    s = s.replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid #1e3a5f;margin:8px 0">');
    s = s.replace(/\n\n/g, '<br><br>');
    s = s.replace(/\n/g, '<br>');
    return s;
  }).join('');
  return text;
}

// ── Text input ────────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', async () => {
  await unlockAudio();
  playGreetingOnce();
  const t = textInput.value.trim();
  if (t) { sendMessage(t); textInput.value = ''; }
});
textInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    await unlockAudio();
    const t = textInput.value.trim();
    if (t) { sendMessage(t); textInput.value = ''; }
  }
});

// Warn on paste if it looks like a secret
textInput.addEventListener('paste', e => {
  const pasted = (e.clipboardData || window.clipboardData).getData('text');
  if (pasted && detectSecret(pasted)) {
    e.preventDefault();
    addMessage('error',
      '⚠️ Paste blocked — clipboard content looks like an API key, token, or password. ' +
      'Secrets should be stored in Vault, not sent to Jarvis.');
  }
});
</script>
